services:
  app:
    build:
      context: .
      target: development
    container_name: rizzoma-app
    ports:
      - "3000:3000"  # Vite dev server
      - "8788:8788"  # Express API server (reserved Rizzoma port)
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/node_modules
    environment:
      NODE_ENV: development
      # FEAT_ALL=1 keeps every Track-A..E feature on in the dev server too
      # (vite.config.ts only auto-enables it for production builds; without
      # this, `npm run dev` tree-shakes every feature flag to false and the
      # container serves a stripped-down app — BUG discovered on VPS
      # 2026-04-21).
      FEAT_ALL: "1"
      ALLOWED_ORIGINS: http://localhost:3000
      REDIS_URL: redis://redis:6379
      COUCHDB_URL: http://admin:password@couchdb:5984
      RABBITMQ_URL: amqp://rabbitmq:5672
      SESSION_SECRET: dev-secret-change-me
    depends_on:
      - redis
      - couchdb
      - rabbitmq
    networks:
      - rizzoma-network

  app-prod:
    build:
      context: .
      target: production
    container_name: rizzoma-app-prod
    profiles: ["prod"]
    environment:
      NODE_ENV: production
      FEAT_ALL: "1"
      COUCHDB_URL: http://admin:password@couchdb:5984
      COUCHDB_DB: project_rizzoma
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: change-me
    ports:
      - "8788:8788"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8788/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - redis
      - couchdb
    networks:
      - rizzoma-network

  redis:
    image: redis:7-alpine
    container_name: rizzoma-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rizzoma-network

  couchdb:
    image: couchdb:3
    container_name: rizzoma-couchdb
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    volumes:
      - couchdb-data:/opt/couchdb/data
    networks:
      - rizzoma-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rizzoma-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - rizzoma-network

  # Sphinx is vestigial from the pre-modernization CoffeeScript codebase.
  # The current TypeScript app uses CouchDB Mango queries for search; no
  # src/ file references Sphinx. Kept behind the `search` profile so an
  # accidental `docker compose up` doesn't try to build a missing
  # Dockerfile.sphinx (issue #42). Enable with `--profile search` if you
  # actually want to bring up the legacy indexer.
  sphinx:
    profiles: ["search"]
    build:
      context: .
      dockerfile: Dockerfile.sphinx
    container_name: rizzoma-sphinx
    ports:
      - "9312:9312"
      - "9306:9306"
    volumes:
      - sphinx-data:/var/lib/sphinxsearch/data
      - ./etc/sphinxsearch:/etc/sphinxsearch
    networks:
      - rizzoma-network

  # Optional: MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: rizzoma-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - rizzoma-network

  clamav:
    image: clamav/clamav:latest
    container_name: rizzoma-clamav
    ports:
      - "3310:3310"
    networks:
      - rizzoma-network

  # Mailhog for development email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: rizzoma-mailhog
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI for viewing emails
    networks:
      - rizzoma-network

networks:
  rizzoma-network:
    driver: bridge

volumes:
  redis-data:
  couchdb-data:
  rabbitmq-data:
  sphinx-data:
  minio-data:
