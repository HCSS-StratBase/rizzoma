<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Timer Preview</title>
    <link rel="stylesheet" href="../shared-styles.css" />
    <style>
      body {
        background:
          radial-gradient(circle at top right, rgba(124, 58, 237, 0.15), transparent 28%),
          linear-gradient(180deg, #faf8ff, #f1ecfb);
      }
      .session-card,
      .checklist {
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(136, 156, 178, 0.18);
        box-shadow: 0 16px 30px rgba(15, 23, 42, 0.06);
      }
      .session-label {
        display: inline-flex;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(124, 58, 237, 0.12);
        color: #7c3aed;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .session-title {
        margin: 10px 0 4px;
        font-size: 24px;
        font-weight: 800;
        color: #241648;
      }
      .session-meta {
        color: #645c82;
        font-size: 13px;
      }
      .checklist {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .check-item {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14px;
        color: #2d254a;
      }
      .check-mark {
        width: 22px;
        height: 22px;
        border-radius: 8px;
        display: inline-grid;
        place-items: center;
        font-size: 12px;
        font-weight: 800;
      }
      .check-done .check-mark {
        background: rgba(16, 185, 129, 0.14);
        color: #0f766e;
      }
      .check-pending .check-mark {
        background: rgba(124, 58, 237, 0.12);
        color: #7c3aed;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { createPreviewApp } from '../app-shell.js';

      function renderFocus(container, data) {
        const session = data.session || {};
        const checklist = Array.isArray(data.checklist) ? data.checklist : [];

        const sessionCard = document.createElement('section');
        sessionCard.className = 'session-card';
        sessionCard.innerHTML = `
          <div class="session-label">Focus session</div>
          <div class="session-title">${session.label || 'Untitled session'}</div>
          <div class="session-meta">${session.duration || 0} minutes · ${session.state || 'ready'}</div>
        `;

        const checklistEl = document.createElement('section');
        checklistEl.className = 'checklist';
        checklist.forEach((item) => {
          const row = document.createElement('div');
          row.className = `check-item ${item.done ? 'check-done' : 'check-pending'}`;
          row.innerHTML = `
            <div class="check-mark">${item.done ? '✓' : '•'}</div>
            <div>${item.label}</div>
          `;
          checklistEl.appendChild(row);
        });

        container.append(sessionCard, checklistEl);
      }

      createPreviewApp({
        title: 'Focus Timer',
        accent: '#7c3aed',
        description: 'This third preview app proves the shared app shell can host different layouts and state models without duplicating bootstrap code.',
        toolbarNote: 'Advance one small focus step and persist it through the shared runtime contract.',
        actionLabel: 'Start next focus block',
        initialHeight: 420,
        initialData: { session: {}, checklist: [] },
        render: renderFocus,
        onAction(data) {
          const session = data.session || {};
          const checklist = Array.isArray(data.checklist) ? data.checklist : [];
          const nextChecklist = checklist.map((item, idx) => idx === 1 ? { ...item, done: true } : item);
          return {
            session: {
              ...session,
              label: `${session.label || 'Session'} · deep work`,
              duration: Number(session.duration || 25) + 10,
              state: 'running',
            },
            checklist: nextChecklist,
          };
        },
      });
    </script>
  </body>
</html>
